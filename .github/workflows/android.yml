name: Android CI

on:
  pull_request:
    branches-ignore:
      - 'l10n_v3_openjdk2'
    types: [ opened, reopened ]
  push:
    branches-ignore:
      - 'l10n_v3_openjdk2'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GPLAY_KEYSTORE_PASSWORD: ${{ secrets.GPLAY_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get LTW
        run: |
          sudo apt update && sudo apt install wget -y
          cd app_pojavlauncher/libs
          wget https://github.com/PojavLauncherTeam/LTW/releases/latest/download/ltw-release.aar

      - name: Get JRE 8
        run: |
          mkdir -p app_pojavlauncher/src/main/assets/components/jre
          wget https://github.com/PojavLauncherTeam/android-openjdk-build-multiarch/releases/download/buildjre8/jre8-pojav.tar.xz -O /tmp/jre8.tar.xz || true
          if [ -f /tmp/jre8.tar.xz ]; then
            tar -xf /tmp/jre8.tar.xz -C app_pojavlauncher/src/main/assets/components/jre
          fi

      - name: Get JRE 17
        run: |
          mkdir -p app_pojavlauncher/src/main/assets/components/jre-new
          wget https://github.com/PojavLauncherTeam/android-openjdk-build-multiarch/releases/download/buildjre17-21/jre17-pojav.tar.xz -O /tmp/jre17.tar.xz || true
          if [ -f /tmp/jre17.tar.xz ]; then
            tar -xf /tmp/jre17.tar.xz -C app_pojavlauncher/src/main/assets/components/jre-new
          fi

      - name: Get JRE 21
        run: |
          mkdir -p app_pojavlauncher/src/main/assets/components/jre-21
          wget https://github.com/PojavLauncherTeam/android-openjdk-build-multiarch/releases/download/buildjre17-21/jre21-pojav.tar.xz -O /tmp/jre21.tar.xz || true
          if [ -f /tmp/jre21.tar.xz ]; then
            tar -xf /tmp/jre21.tar.xz -C app_pojavlauncher/src/main/assets/components/jre-21
          fi

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Build JRE JAR files
        run: |
          ./scripts/languagelist_updater.sh
          mkdir out
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug .apk
        run: |
          gradle :app_pojavlauncher:assembleDebug
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk

      - name: Build APK without runtime
        run: |
          rm -rf app_pojavlauncher/src/main/assets/components/jre
          rm -rf app_pojavlauncher/src/main/assets/components/jre-new
          rm -rf app_pojavlauncher/src/main/assets/components/jre-21
          gradle assembleDebug
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug-noruntime.apk

      - name: Gen md5sums
        run: |
          md5sum out/app-debug.apk > out/app-debug.md5
          md5sum out/app-debug-noruntime.apk > out/app-debug-noruntime.md5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: out/app-debug.*

      - name: Upload APK (without runtime)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-noruntime
          path: out/app-debug-noruntime.*
