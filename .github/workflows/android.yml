name: Android CI

on:
  push:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Get LTW
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          repo: MojoLauncher/LTW
          workflow: android.yml
          workflow_conclusion: success
          name: output-aar
          path: app_pojavlauncher/libs

      - name: Get JRE 8
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          workflow: build.yml
          workflow_conclusion: success
          branch: buildjre8
          name: jre8-pojav
          path: app_pojavlauncher/src/main/assets/components/jre

      - name: Get JRE 17
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          workflow: build.yml
          workflow_conclusion: success
          branch: buildjre17-21
          name: jre17-pojav
          path: app_pojavlauncher/src/main/assets/components/jre-new

      - name: Get JRE 21
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          workflow: build.yml
          workflow_conclusion: success
          branch: buildjre17-21
          name: jre21-pojav
          path: app_pojavlauncher/src/main/assets/components/jre-21

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Create out directory
        run: mkdir out

      - name: Build Debug .apk
        run: |
          gradle :app_pojavlauncher:assembleDebug
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk

      - name: Gen md5sums
        run: md5sum out/app-debug.apk > out/app-debug.md5

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: out/app-debug.apk
